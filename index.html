<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落研 貸し可視化</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f4f8; padding: 20px; color: #2d3748; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; margin-bottom: 25px; font-size: 1.5rem; }
        
        .setup-area { display: flex; gap: 8px; margin-bottom: 30px; }
        input[type="text"] { flex-grow: 1; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 8px; }
        .btn-add { background: #2d3748; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .member-block { margin-bottom: 35px; padding: 15px; background: #fff; border: 1px solid #edf2f7; border-radius: 12px; position: relative; }
        .member-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .name-label { font-weight: bold; font-size: 1.1rem; color: #2d3748; }

        .chart-container { position: relative; height: 26px; background: #edf2f7; border-radius: 13px; display: flex; align-items: center; border: 1px solid #e2e8f0; overflow: hidden; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #cbd5e0; z-index: 3; }
        .bar { height: 100%; position: absolute; left: 50%; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 2; }
        .bar.negative { transform: translateX(-100%); }

        .tick-mini-wrap { display: flex; justify-content: flex-end; align-items: center; margin-top: 12px; gap: 8px; }
        .tick-label { font-size: 0.75rem; color: #718096; font-weight: bold; }
        .tick-controls { display: flex; align-items: center; gap: 4px; background: #f8fafc; padding: 2px 6px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .tick-val { font-family: monospace; font-size: 0.9rem; font-weight: bold; min-width: 20px; text-align: center; }

        .controls { display: flex; gap: 4px; align-items: center; }
        button { border: none; border-radius: 4px; cursor: pointer; color: white; transition: 0.1s; }
        .btn-main { width: 28px; height: 28px; font-weight: bold; }
        .btn-tick { width: 20px; height: 20px; font-size: 0.8rem; background: #cbd5e0; color: #4a5568; }
        .btn-plus { background: #4299e1; }
        .btn-minus { background: #f56565; }

        /* 削除ボタンの調整 */
        .btn-del { background: none; border: none; color: #718096; cursor: pointer; font-size: 0.75rem; margin-left: 10px; font-weight: bold; text-decoration: underline; }
        .btn-del:hover { color: #e53e3e; }

        .ticks { position: relative; height: 14px; width: 100%; display: flex; justify-content: space-between; padding: 0 2px; box-sizing: border-box; margin-top: 2px; }
        .tick { width: 1px; height: 4px; background: #e2e8f0; position: relative; }
        .tick.major { background: #cbd5e0; height: 6px; }
        .tick::after { content: attr(data-value); position: absolute; top: 6px; left: 50%; transform: translateX(-50%); font-size: 0.55rem; color: #cbd5e0; }

        .share-area { margin-top: 30px; padding: 15px; background: #fffaf0; border-radius: 10px; text-align: center; }
        #shareUrl { width: 90%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>2026年度 落研貸しメーター</h1>
    
    <div class="setup-area">
        <input type="text" id="newName" placeholder="名前...">
        <button class="btn-add" onclick="addMember()">追加</button>
    </div>

    <div id="app"></div>

    <div class="share-area">
        <input type="text" id="shareUrl" readonly onclick="this.select()">
    </div>
</div>

<script>
    let members = [];

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('d');
        if (data) {
            try {
                members = JSON.parse(decodeURIComponent(atob(data)));
                updateView();
            } catch (e) { console.error(e); }
        }
    };

    function addMember() {
        const input = document.getElementById('newName');
        if (input.value.trim()) {
            members.push({ id: Date.now(), name: input.value.trim(), balance: 0, tick: 0 });
            input.value = '';
            updateView();
        }
    }

    function change(id, key, val) {
        const m = members.find(m => m.id === id);
        if (m) {
            if (key === 'tick') {
                m[key] = Math.max(0, m[key] + val);
            } else {
                m[key] += val;
            }
            updateView();
        }
    }

    function getBarColor(val) {
        const abs = Math.abs(val);
        const level = Math.floor(abs / 5);
        if (val >= 0) {
            const blues = ['#90cdf4', '#63b3ed', '#4299e1', '#3182ce', '#2b6cb0', '#2c5282', '#2a4365'];
            return blues[Math.min(level, blues.length - 1)];
        } else {
            const reds = ['#feb2b2', '#fc8181', '#f56565', '#e53e3e', '#c53030', '#9b2c2c', '#742a2a'];
            return reds[Math.min(level, reds.length - 1)];
        }
    }

    function getLimit() {
        const max = members.length > 0 ? Math.max(...members.map(m => Math.abs(m.balance))) : 0;
        return max > 10 ? Math.ceil(max / 10) * 10 : 10;
    }

    function updateView() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        const limit = getLimit();

        members.forEach(m => {
            const barColor = getBarColor(m.balance);
            const block = document.createElement('div');
            block.className = 'member-block';
            block.innerHTML = `
                <div class="member-header">
                    <div class="name-label">${m.name}</div>
                    <div class="controls">
                        <button class="btn-main btn-minus" onclick="change(${m.id}, 'balance', -1)">-</button>
                        <span style="min-width:35px; text-align:center; font-weight:bold; font-family:monospace; color:${barColor}">${m.balance > 0 ? '+' : ''}${m.balance}</span>
                        <button class="btn-main btn-plus" onclick="change(${m.id}, 'balance', 1)">+</button>
                    </div>
                </div>

                <div class="chart-container">
                    <div class="center-line"></div>
                    <div class="bar ${m.balance >= 0 ? 'positive' : 'negative'}" 
                         style="width: ${(Math.abs(m.balance)/limit)*50}%; background: ${barColor}">
                    </div>
                </div>

                <div class="ticks">
                    ${(function(){
                        let h = '';
                        let step = limit <= 20 ? 2 : (limit <= 50 ? 5 : 10);
                        for(let i=-limit; i<=limit; i+=step){
                            let major = (i%(step*5)===0 || i===0 || Math.abs(i)===limit);
                            h += `<div class="tick ${major?'major':''}" data-value="${major?i:''}"></div>`;
                        }
                        return h;
                    })()}
                </div>

                <div class="tick-mini-wrap">
                    <span class="tick-label">チックカウンター</span>
                    <div class="tick-controls">
                        <button class="btn-tick" onclick="change(${m.id}, 'tick', -1)">-</button>
                        <span class="tick-val">${m.tick}</span>
                        <button class="btn-tick" onclick="change(${m.id}, 'tick', 1)">+</button>
                    </div>
                    <button class="btn-del" onclick="if(confirm('${m.name}さんを削除しますか？')){members=members.filter(x=>x.id!==${m.id});updateView();}">del</button>
                </div>
            `;
            app.appendChild(block);
        });

        const encoded = btoa(encodeURIComponent(JSON.stringify(members)));
        const url = window.location.origin + window.location.pathname + '?d=' + encoded;
        document.getElementById('shareUrl').value = url;
        window.history.replaceState(null, null, url);
    }
</script>
</body>
</html>
